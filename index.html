<body>

<!-- Popup -->

<div id="popup" class="popup">
    <span id="closeBtn">&times;</span>
    <img id="popupImg" src="assets/brand.png">
</div>

        </div>

        <h1 class="title">Bio Link & Mini Website Design</h1>

        <div class="buttons">
            <a href="https://www.fiverr.com/s/gD7aAAo" target="_blank" class="btn">
                <i class="fa-solid fa-briefcase"></i> Fiverr

            <a href="shopee.co.id/mbeijin" target="_blank" class="btn">
                <i class="fa-solid fa-bag-shopping"></i> Shopee
            </a>
            <a href="portfolio.html" class="btn"><i class="fa-brands fa-behance"></i> Portfolio</a>
            <a href="https://www.instagram.com/arfstudio.02?" class="btn"><i class="fa-brands fa-instagram"></i> Instagram</a>

        </div>

    </div>
</div>
  

<!-- BOTTOM BAR -->
<div id="bottom-bar-container"></div>


<script> 
const logo = document.getElementById("logoImg");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popupImg");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("closeBtn");


logo.onclick = () => {
    console.log("LOGO CLICKED");
    popup.classList.add("active");
    overlay.classList.add("active");

    popupImg.src = logo.src;
    document.body.style.overflow = "hidden";
};

function closePopup() {
    popup.classList.remove("active");
    overlay.classList.remove("active");

    document.body.style.overflow = "auto";
}

closeBtn.onclick = closePopup;
overlay.onclick = closePopup;
fetch("./components/bottom-bar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("bottom-bar-container").innerHTML = data;

    const script = document.createElement("script");
    script.src = "js/bottom-bar.js";
    document.body.appendChild(script);
});
</script>

</script>
</body>
</html>
